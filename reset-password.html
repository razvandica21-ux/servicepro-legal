<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServicePro - Resetare parolă</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #242424; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #ff6b2b; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #ff6b2b; }
    button { width: 100%; background: #ff6b2b; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 500; cursor: pointer; }
    button:hover { background: #e55a1f; }
    .mesaj { margin-top: 16px; font-size: 14px; }
    .succes { color: #4caf7d; }
    .eroare { color: #f44336; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <h1>ServicePro</h1>
    <p>Introdu noua ta parolă mai jos.</p>
    <input type="password" id="parola" placeholder="Parolă nouă" />
    <input type="password" id="parola2" placeholder="Confirmă parola" />
    <button onclick="reseteaza()">Salvează parola</button>
    <div id="mesaj" class="mesaj"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://tdszcdltfppduyttpxmp.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkc3pjZGx0ZnBwZHV5dHRweG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MDgxNDUsImV4cCI6MjA5NjM4NDE0NX0.b_4BGkLWixgL96yJAGhJXUw8wVrNjFufvH_YWe3HNiw'
    );

    // Preia token-ul din URL
    const params = new URLSearchParams(window.location.hash.replace('#', '?'));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken) {
      client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }

    async function reseteaza() {
      const parola = document.getElementById('parola').value;
      const parola2 = document.getElementById('parola2').value;
      const mesaj = document.getElementById('mesaj');

      if (!parola || parola.length < 6) {
        mesaj.className = 'mesaj eroare';
        mesaj.textContent = 'Parola trebuie să aibă minim 6 caractere.';
        return;
      }
      if (parola !== parola2) {
        mesaj.className = 'mesaj eroare';
        mesaj.textContent = 'Parolele nu coincid.';
        return;
      }

      const { error } = await client.auth.updateUser({ password: parola });
      if (error) {
        mesaj.className = 'mesaj eroare';
        mesaj.textContent = 'Eroare: ' + error.message;
      } else {
        mesaj.className = 'mesaj succes';
        mesaj.textContent = '✅ Parola a fost schimbată! Te poți loga acum în aplicație.';
      }
    }
  </script>
</body>
</html>
